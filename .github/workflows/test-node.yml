name: Node CI

on:
  push:
    branches: [main]
    paths:
      - "node/**"
      - ".github/workflows/test-node.yml"
  pull_request:
    paths:
      - "node/**"
      - ".github/workflows/test-node.yml"

permissions:
  contents: read

jobs:
  test:
    name: test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    strategy:
      fail-fast: false
      # Library's "engines" claim is node>=18 (no Node 20+ APIs used), but
      # vitest@4 (dev dep) requires node>=20 to RUN the test suite. CI runs
      # the suite on 20/22/24; the package itself still works on Node 18
      # for consumers. The build-only job below verifies that explicitly.
      matrix:
        node-version: ["20", "22", "24"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Run vitest
        run: npm test

      - name: Pack tarball (smoke test)
        run: npm pack --dry-run

  build-node18:
    name: build-only (Node 18 — engines floor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: node/package-lock.json

      # vitest@4 won't run on Node 18 (it requires Node 20+), but the
      # library itself uses no Node 20+ APIs. Verify the TypeScript build
      # still succeeds on 18 so the "engines: node>=18" claim is enforced.
      # `--ignore-scripts` skips prepublishOnly which would invoke vitest.
      - name: Install dependencies (production-only)
        run: npm ci --ignore-scripts

      - name: TypeScript build (Node 18 floor)
        run: npm run build
