name: Go CI

on:
  push:
    branches: [main]
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"
  pull_request:
    paths:
      - "go/**"
      - ".github/workflows/go-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # go.mod declares `go 1.25` — pinned by github.com/prometheus/procfs
      # v0.20+. Test on the floor + the latest minor.
      matrix:
        go-version: ["1.25.x", "1.26.x"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go/go.sum

      - name: go vet
        working-directory: go
        run: go vet ./...

      - name: go test (race detector + coverage)
        working-directory: go
        # Exclude examples/ — they're package main demos; combining them with
        # -coverprofile=./... triggers `go: no such tool "covdata"` failure.
        run: |
          PKGS=$(go list ./... | grep -v /examples/ | tr '\n' ' ')
          go test -race -coverprofile=coverage.out $PKGS

      - name: Coverage summary
        working-directory: go
        run: go tool cover -func=coverage.out | tail -20

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Match go.mod's declared minimum (1.25); see comment on the
          # test job's matrix above.
          go-version: "1.25.x"
          cache-dependency-path: go/go.sum

      - name: Install staticcheck
        # Pinned to a tagged release rather than @latest to keep CI immune to
        # upstream takeover or typosquat redirect.
        run: go install honnef.co/go/tools/cmd/staticcheck@2026.1

      - name: staticcheck
        working-directory: go
        run: staticcheck ./...
